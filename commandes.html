<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des commandes - DECO RN ADMIN</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/table.css">
    <style>
        /* Styles additionnels d'impression du contrat */
        @media print {
            body * {
                visibility: hidden;
            }
            #invoice-print-section, #invoice-print-section * {
                visibility: visible;
            }
            #invoice-print-section {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                color: black;
                padding: 40px;
                font-family: 'Poppins', sans-serif;
            }
            .sidebar, .top-header, .control-panel, .pagination, .action-btn, #app-sidebar, .mobile-header {
                display: none !important;
            }
        }

        /* Invoice Modal Popup */
        .invoice-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            z-index: 150;
            align-items: center;
            justify-content: center;
        }

        .invoice-card {
            background: white;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 650px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid var(--primary-rose);
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Barre supérieure de contrôle : recherche, filtres et bouton d'action principal -->
        <div class="control-panel">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="commandes-search-input" placeholder="Rechercher par cliente, téléphone ou produit...">
            </div>
            
            <div class="filter-group">
                <!-- Filtre par statut -->
                <select class="filter-select" id="filter-status-select">
                    <option value="Tous">Tous les statuts</option>
                    <option value="Réservé">Réservé</option>
                    <option value="Sorti">Sorti</option>
                    <option value="Retourné">Retourné</option>
                    <option value="Retard">Retard</option>
                </select>

                <!-- Filtre par catégorie de produits -->
                <select class="filter-select" id="filter-category-select">
                    <option value="Tous">Toutes les catégories</option>
                    <option value="Box Fiançaille">Box Fiançaille</option>
                    <option value="Valises">Valises</option>
                    <option value="Accessoires">Accessoires</option>
                    <option value="Mariage">Mariage</option>
                </select>

                <!-- Tri par -->
                <select class="filter-select" id="sort-by-select">
                    <option value="id-desc">ID Décroissant (Récent)</option>
                    <option value="id-asc">ID Croissant</option>
                    <option value="date-desc">Date de réservation (Nouveau)</option>
                    <option value="prix-desc">Prix le plus élevé</option>
                    <option value="reste-desc">Reste à payer</option>
                </select>

                <!-- Ajouter -->
                <a href="/nouvelle.html" class="btn btn-primary" style="border-radius: var(--radius-md); font-size: 0.85rem; padding: 10px 20px;">
                    <i class="fa-solid fa-plus"></i> Nouvelle Commande
                </a>
            </div>
        </div>

        <!-- Tableau d'affichage des Commandes -->
        <div class="table-wrapper">
            <div class="table-responsive">
                <table class="custom-table" id="commandes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Cliente</th>
                            <th>Produit / Catégorie</th>
                            <th>Dates de Location</th>
                            <th>Financier (Prix/Caution)</th>
                            <th>Paiement</th>
                            <th>Statut</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="commandes-tbody">
                        <!-- Rempli dynamiquement -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination de la liste -->
            <div class="pagination">
                <div id="pagination-info">Affichage de 0-0 sur 0 commandes</div>
                <div class="pagination-buttons">
                    <button class="pagination-btn" id="prev-page-btn" disabled><i class="fa-solid fa-chevron-left"></i> Précédent</button>
                    <button class="pagination-btn" id="next-page-btn" disabled>Suivant <i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
        </div>

        <!-- Fenêtre d'affichage du Contrat/Facture à imprimer -->
        <div class="invoice-modal" id="print-invoice-modal">
            <div class="invoice-card animate-fade-in" id="invoice-print-section">
                <!-- Rempli dynamiquement pour l'impression -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/commandes.js"></script>
</body>
</html>
