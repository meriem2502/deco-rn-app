<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - DECO RN ADMIN</title>
    <!-- Google Fonts Poppins -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/forms.css">
    <style>
        .auth-card {
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        .auth-logo {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .auth-logo .logo-icon {
            width: 60px;
            height: 60px;
            font-size: 1.8rem;
            border-radius: 18px;
        }
        .auth-logo h1 {
            color: var(--primary-rose-dark);
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
        }
        .auth-logo p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .login-error {
            background: rgba(194, 24, 91, 0.1);
            border: 1px solid rgba(194, 24, 91, 0.3);
            color: var(--color-danger);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .password-input-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .password-input-container input {
            padding-right: 45px;
        }
        .password-toggle-icon {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition-smooth);
        }
        .password-toggle-icon:hover {
            color: var(--primary-rose-dark);
        }
    </style>
</head>
<body class="auth-body">
    <div class="auth-wrapper animate-fade-in">
        <div class="glass-card auth-card">
            <div class="auth-logo">
                <div class="logo-icon">RN</div>
                <div>
                    <h1 id="enterprise-title">DECO RN</h1>
                    <p>Espace Administration</p>
                </div>
            </div>

            <div class="login-error" id="login-error-msg">
                <i class="fa-solid fa-triangle-exclamation"></i> Mot de passe incorrect. Veuillez réessayer.
            </div>

            <form id="login-form">
                <div class="form-group" style="margin-bottom: 25px;">
                    <label class="form-label">
                        <i class="fa-solid fa-user-shield"></i> Administratrice
                    </label>
                    <input type="text" class="form-control" value="Nadjla" readonly style="background: rgba(255,255,255,0.2); cursor: not-allowed; font-weight: 600;">
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label class="form-label">
                        <i class="fa-solid fa-key"></i> Mot de passe sécurisé
                    </label>
                    <div class="password-input-container">
                        <input type="password" id="admin-password-input" class="form-control" placeholder="Entrez votre mot de passe" required autocomplete="current-password">
                        <i class="fa-solid fa-eye password-toggle-icon" id="password-toggle-btn"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Se connecter
                </button>
            </form>
        </div>
    </div>

    <!-- Script de Connexion -->
    <script type="module" src="/js/auth.js"></script>
</body>
</html>
